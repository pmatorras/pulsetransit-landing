<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Favicon set 1 (standard) -->
<link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/img/favicon-16x16.png">
<link rel="shortcut icon" href="/assets/img/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/assets/img/apple-touch-icon.png">

<!-- Favicon set 2 (Android/PWA) -->
<link rel="stylesheet" href="/assets/css/styles.css">
<link rel="icon" type="image/png" sizes="192x192" href="assets/icons/android-chrome-192x192.png">
<link rel="icon" type="image/png" sizes="512x512" href="assets/icons/android-chrome-512x512.png">

<link rel="canonical" id="canonical-tag">
<script>
  // Dynamically set canonical based on current URL
  const currentUrl = window.location.href.replace(window.location.hash, '');
  document.getElementById('canonical-tag').href = currentUrl;
</script>
