<body>
    <iframe id="app" src="https://pmatorras-pulsetransit.hf.space/"></iframe>

    <script>
    const HF_URL = "https://pmatorras-pulsetransit.hf.space/";
    const FALLBACK_URL = "https://tustracker.streamlit.app/";

    const iframe = document.getElementById("app");
    let loaded = false;

    iframe.addEventListener("load", () => {
        loaded = true;
    });

    // If HF didn't load within 12s, fall back
    setTimeout(() => {
        if (!loaded) iframe.src = FALLBACK_URL;
    }, 12000);
    </script>
